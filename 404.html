<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>404 · charubak.cc</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0c0a;--ink:#e4e8d5;--ink-2:#b7bda2;--ink-3:#7d8468;--accent:#c4f542;--accent-2:#ff6a3d;--mono:"JetBrains Mono",monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.06;background-image:repeating-linear-gradient(0deg,rgba(196,245,66,.5) 0 1px,transparent 1px 3px)}
  a{color:inherit;text-decoration:none}
  .page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;position:relative;z-index:1}
  .code{font-size:clamp(80px,18vw,180px);font-weight:300;letter-spacing:-.04em;color:var(--accent);line-height:1;opacity:.8}
  .label{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin:16px 0 8px}
  .msg{font-size:clamp(22px,4vw,40px);color:var(--ink);font-weight:500;letter-spacing:-.02em;margin-bottom:12px}
  .sub{color:var(--ink-2);font-size:14px;margin-bottom:40px;line-height:1.6}
  .links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(196,245,66,.3);color:var(--ink);transition:all .2s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .btn.primary:hover{background:var(--ink);border-color:var(--ink)}
  .cursor{display:inline-block;width:10px;height:1em;background:var(--accent);vertical-align:middle;margin-left:4px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="page">
  <div class="code">404</div>
  <div class="label">$ find . -name "this-page" → exit code 1</div>
  <div class="msg">path not found<span class="cursor"></span></div>
  <p class="sub">The page you're looking for doesn't exist or was moved.</p>
  <div class="links">
    <a class="btn primary" href="index.html">./home</a>
    <a class="btn" href="resume.html">./cv</a>
    <a class="btn" href="tool-studio.html">./studio</a>
    <a class="btn" href="#" onclick="history.back();return false">← ./back</a>
  </div>
</div>
</body>
</html>
